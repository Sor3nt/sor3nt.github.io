<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipper Zero - ESP 32 Port Flash Tool</title>
<script type="module">
import { ESPLoader, Transport } from 'https://unpkg.com/esptool-js@0.5.4/bundle.js';

const FLASH_PARTS = [
  { path: 'latest/bootloader.bin', offset: 0x0 },
  { path: 'latest/partition-table.bin', offset: 0x8000 },
  { path: 'latest/furi_esp32.bin', offset: 0x10000 },
];

const $ = id => document.getElementById(id);

let port = null;
let transport = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

function setError(msg) {
  const el = $('error-banner');
  if (msg) {
    el.textContent = msg;
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

function setConnectState(state) {
  const btn = $('connect-btn');
  const spinner = $('connect-spinner');
  const btnText = $('connect-text');

  if (state === 'waiting') {
    btn.disabled = true;
    spinner.style.display = 'inline-block';
    btnText.textContent = 'Waiting for device...';
  } else if (state === 'select') {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'Select device';
  } else if (state === 'connected') {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'Flash now';
    btn.classList.add('flash-ready');
  }
}

async function handleConnect() {
  const btn = $('connect-btn');

  if (btn.classList.contains('flash-ready')) {
    startFlash();
    return;
  }

  setError(null);
  setConnectState('waiting');

  try {
    port = await navigator.serial.requestPort();
    transport = new Transport(port, true);
    setConnectState('connected');
  } catch (e) {
    port = null;
    transport = null;
    if (e.name === 'NotFoundError') {
      setConnectState('select');
    } else {
      setError('Connection failed: ' + e.message);
      setConnectState('select');
    }
  }
}

async function startFlash() {
  showScreen('screen-flash');
  const progress = $('progress-bar');
  const progressText = $('progress-text');

  try {
    const esploader = new ESPLoader({
      transport,
      baudrate: 460800,
      romBaudrate: 115200,
      terminal: {
        clean() {},
        writeLine(data) { console.log(data); },
        write(data) { console.log(data); },
      },
    });

    progressText.textContent = 'Connecting to bootloader...';
    await esploader.main();
    await esploader.flashId();

    const fileArray = [];
    let totalSize = 0;

    for (const part of FLASH_PARTS) {
      progressText.textContent = `Loading ${part.path.split('/').pop()}...`;
      const resp = await fetch(part.path);
      if (!resp.ok) throw new Error(`Failed to load ${part.path}: ${resp.status}`);
      const data = await resp.arrayBuffer();
      const bytes = new Uint8Array(data);
      fileArray.push({ data: binaryToStr(bytes), address: part.offset });
      totalSize += bytes.length;
    }

    progressText.textContent = `Flashing ${(totalSize / 1024 / 1024).toFixed(1)} MB...`;

    await esploader.writeFlash({
      fileArray,
      flashSize: '16MB',
      flashMode: 'dio',
      flashFreq: '80m',
      eraseAll: false,
      compress: true,
      reportProgress: (idx, written, total) => {
        const pct = Math.round((written / total) * 100);
        progress.style.width = pct + '%';
        progressText.textContent = `Flashing part ${idx + 1}/${FLASH_PARTS.length}... ${pct}%`;
      },
    });

    progressText.textContent = 'Resetting device...';
    await transport.setDTR(false);
    await transport.setRTS(true);
    await new Promise(r => setTimeout(r, 100));
    await transport.setRTS(false);
    await new Promise(r => setTimeout(r, 100));

    showScreen('screen-success');

  } catch (e) {
    console.error('Flash error:', e);
    setError('Flash failed: ' + e.message);
    setConnectState('select');
    port = null;
    transport = null;
    showScreen('screen-connect');
  }
}

function binaryToStr(u8) {
  let str = '';
  for (let i = 0; i < u8.length; i++) str += String.fromCharCode(u8[i]);
  return str;
}

window.handleConnect = handleConnect;

// Check WebSerial support
if (!('serial' in navigator)) {
  $('connect-btn').disabled = true;
  $('connect-text').textContent = 'WebSerial not supported';
  setError('Use Chrome or Edge on desktop to flash.');
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    max-width: 480px;
    width: 100%;
    padding: 40px 24px;
  }
  h1 {
    font-size: 2.2rem;
    font-weight: 700;
    color: #ff8c00;
    margin-bottom: 6px;
  }
  .subtitle {
    color: #666;
    font-size: 0.9rem;
    margin-bottom: 40px;
  }

  /* Error banner */
  #error-banner {
    display: none;
    background: #2a0000;
    border: 1px solid #5a1010;
    color: #ff5555;
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 24px;
    font-size: 0.85rem;
  }

  /* Screens */
  .screen { display: none; }
  .screen.active { display: block; }

  /* Screen 1: Connect */
  .connect-text {
    color: #999;
    font-size: 1rem;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #ff8c00;
    color: #000;
    font-size: 1.1rem;
    font-weight: 600;
    padding: 16px 48px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 260px;
    justify-content: center;
  }
  .btn:hover:not(:disabled) { background: #ff9f2e; transform: scale(1.02); }
  .btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }
  .btn.flash-ready { background: #00c853; color: #000; }
  .btn.flash-ready:hover { background: #2ee06a; }

  /* Spinner */
  .spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .chip {
    display: inline-block;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    color: #666;
    margin-top: 20px;
  }

  /* Screen 2: Flashing */
  .flash-info {
    color: #bbb;
    font-size: 0.95rem;
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .flash-warning {
    color: #cc8800;
    font-size: 0.82rem;
    margin-bottom: 32px;
  }
  .progress-container {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    height: 28px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff8c00, #ffb347);
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 12px;
  }
  #progress-text {
    color: #888;
    font-size: 0.85rem;
  }

  /* Screen 3: Success */
  .success-icon {
    font-size: 4rem;
    margin-bottom: 16px;
  }
  .success-text {
    font-size: 2rem;
    font-weight: 700;
    color: #00c853;
    margin-bottom: 12px;
  }
  .success-sub {
    color: #666;
    font-size: 0.9rem;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Flipper Zero</h1>
    <p class="subtitle">ESP32 Port</p>

    <div id="error-banner"></div>

    <!-- Screen 1: Connect -->
    <div id="screen-connect" class="screen active">
      <p class="connect-text">
        Connect your LilyGo T-Embed CC1101<br>via USB to get started.
      </p>

      <button id="connect-btn" class="btn" onclick="handleConnect()">
        <span id="connect-spinner" class="spinner"></span>
        <span id="connect-text">Select device</span>
      </button>

      <div class="chip">ESP32-S3 &bull; USB-C &bull; WebSerial</div>
    </div>

    <!-- Screen 2: Flashing -->
    <div id="screen-flash" class="screen">
      <p class="flash-info">Uploading firmware to device...</p>
      <p class="flash-warning">Do not disconnect the USB cable.</p>

      <div class="progress-container">
        <div id="progress-bar" class="progress-fill"></div>
      </div>
      <p id="progress-text">Preparing...</p>
    </div>

    <!-- Screen 3: Success -->
    <div id="screen-success" class="screen">
      <div class="success-icon">&#10003;</div>
      <div class="success-text">Success!</div>
      <p class="success-sub">Firmware flashed successfully.<br>Your device is rebooting.</p>
    </div>
  </div>
</body>
</html>
